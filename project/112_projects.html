<script src="../js/img-comparison-slider.js"></script>

<script>
  function setupExpandButtons() {
   document.querySelectorAll('.btn-more').forEach(btn => {

    btn.addEventListener('click', function() {

      const card = this.closest('.project-card');
      const content = card.querySelector('.project-content');

      // 先把其他卡片收合
      document.querySelectorAll('.project-card').forEach(c => {
        if (c !== card) {
          c.classList.remove('expanded-card');
          c.querySelector('.project-content').classList.remove('expanded');
          c.querySelector('.btn-more').textContent = '看更多';
        }
      });

      // 切換目前卡片
      if (card.classList.contains('expanded-card')) {
        card.classList.remove('expanded-card');
        content.classList.remove('expanded');
        this.textContent = '看更多';
      } else {
        card.classList.add('expanded-card');
        content.classList.add('expanded');
        this.textContent = '收合';
      }

    });
   });
  }

  document.addEventListener('DOMContentLoaded', setupExpandButtons);
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const elements = document.querySelectorAll(".fade-up, .fade-img");

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  }, {
    threshold: 0.15
  });

  elements.forEach(el => observer.observe(el));

});
</script>
